name: Weekly Watchlist Update

on:
  schedule:
    # 毎週日曜日 22:00 JST = UTC 13:00
    - cron: '0 13 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Update watchlist
        env:
          EDINET_DB_API_KEY: ${{ secrets.EDINET_DB_API_KEY }}
        run: python scripts/layer1_update_watchlist.py
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist.csv data/watchlist_backup_*.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Weekly watchlist update: $(date +'%Y-%m-%d')"
          git push
